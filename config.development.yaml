server:
  port: 8080
  mode: debug
  trusted_proxies:
    - 127.0.0.1
    - ::1

database:
  host: localhost
  port: 5432
  user: admin
  password: ""
  name: mydb
  ssl_mode: disable
  time_zone: Asia/Shanghai

redis:
  addr: localhost:6379
  password: ""
  db: 0

mail:
  host: smtp.qq.com
  port: 465
  username: ""
  password: ""

jwt:
  private_key_path: ./secrets/jwt_private.pem
  public_key_path: ./secrets/jwt_public.pem
  access_expire: 15m
  refresh_expire: 168h

cors:
  allow_origins:
    - http://localhost:3000
    - http://127.0.0.1:3000
    - http://localhost:5173
    - http://127.0.0.1:5173
  allow_methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - OPTIONS
  allow_headers:
    - Origin
    - Content-Type
    - Accept
    - Authorization
    - X-Requested-With
  expose_headers:
    - Content-Length
  allow_credentials: false
