services:
  # PostgreSQL 数据库服务
  db:
    image: postgres:15-alpine
    container_name: blog-db
    environment:
      POSTGRES_USER: ${DATABASE_USER:-${DB_USER}}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-${DB_PASSWORD}}
      POSTGRES_DB: ${DATABASE_NAME:-${DB_NAME}}
      TZ: Asia/Shanghai
    ports:
      - "${DB_HOST_PORT:-5433}:5432"
    volumes:
      # 数据持久化
      - postgres_data:/var/lib/postgresql/data
      # 初始化脚本（可选）
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - blog-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-${DB_USER}} -d ${DATABASE_NAME:-${DB_NAME}}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis 服务
  redis:
    image: redis:7-alpine
    container_name: blog-redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - blog-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Go 应用服务
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blog-app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${SERVER_PORT:-${APP_PORT}}:8080"
    environment:
      APP_ENV: production
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: ${DATABASE_USER:-${DB_USER}}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-${DB_PASSWORD}}
      DATABASE_NAME: ${DATABASE_NAME:-${DB_NAME}}
      DATABASE_SSL_MODE: disable
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}
      SERVER_MODE: ${SERVER_MODE:-${GIN_MODE:-release}}
      SERVER_TRUSTED_PROXIES: ${SERVER_TRUSTED_PROXIES:-${GIN_TRUSTED_PROXIES:-127.0.0.1,::1}}
      JWT_PRIVATE_KEY_PATH: ${JWT_PRIVATE_KEY_PATH:-/app/secrets/jwt_private.pem}
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH:-/app/secrets/jwt_public.pem}
      TZ: Asia/Shanghai
    volumes:
      - ${JWT_SECRETS_HOST_DIR:-./secrets}:/app/secrets:ro
    networks:
      - blog-network
    restart: unless-stopped
    # 可选：添加日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# 命名卷用于数据持久化
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# 自定义网络
networks:
  blog-network:
    driver: bridge
